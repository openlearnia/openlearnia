name: Deploy Password Strength Lab

# Required GitHub secrets:
#   CLOUDFLARE_API_TOKEN            - API token with Cloudflare Pages Edit permission
#   CLOUDFLARE_ACCOUNT_ID           - Cloudflare account ID
#   CF_PAGES_PASSWORD_STRENGTH_LAB  - Cloudflare Pages project name for this app

on:
  push:
    branches: [main]
    paths:
      - 'projects/tools/password-strength-lab/**'
      - '.github/workflows/deploy-password-strength-lab.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: projects/tools/password-strength-lab
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: projects/tools/password-strength-lab/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: projects/tools/password-strength-lab
          command: pages deploy dist --project-name=${{ secrets.CF_PAGES_PASSWORD_STRENGTH_LAB }}
